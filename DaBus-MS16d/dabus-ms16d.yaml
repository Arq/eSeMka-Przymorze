#modbus_controller:
#   - id: modbus_sem1    #Smart Energy Meter DDS1946-4P
#     address: 0x1  ## address of the Modbus slave device on the bus
#     modbus_id: modbus_master     
#     setup_priority: -10
###-------------------------


#RS485 port for modbus slave (server) responding to master device
uart:  
   - id: uart_modbus
     tx_pin: 27  #pin24 
     rx_pin: 25  #pin26 
     baud_rate: 115200
     stop_bits: 1

## defining modbus slave (server)   
modbus:
   - uart_id: uart_modbus
     id: modbus_server
     flow_control_pin: GPIO23 # pin12  or GPIO32 pin28
     role: server


modbus_controller:
  - id: modbus_server_controller
    modbus_id: modbus_server
    address: 0x20    # address of this modbus device - is updated by initialization script
    server_registers:
      - address: 0x0000  # addres of data register
        value_type: U_WORD  #unsigned 16bit integer
        read_lambda: |-
          int temp = id(register_latch_0);
          id(register_latch_0) = id(sensors_map).state;
          return temp;
          

