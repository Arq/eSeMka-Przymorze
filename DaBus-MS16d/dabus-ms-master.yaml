binary_sensor:

  - platform: gpio
    name: In 0
    id: in0
    pin: 
      number: GPIO36   #pin4 
      inverted: true
      mode: 
        input: true
        #pullup: true
    web_server:
      sorting_weight: 1  
      sorting_group_id: sorting_group_states
    filters:  
      - lambda: |-  
          if (x) {
            id(data_buf_latch)[1] |= 1;
          }
          return x;
  - platform: gpio
    name: In 1
    id: in1 
    pin: 
      number: GPIO39   #pin5 #input only
      inverted: true
      mode: 
        input: true
    web_server:
      sorting_weight: 2  
      sorting_group_id: sorting_group_states
    filters:   
      - lambda: |-  
          if (x) {
            id(data_buf_latch)[1] |= 2;
          }
          return x;     
  - platform: gpio
    name: In 2
    id: in2   
    pin: 
      number: GPIO26   #pin6
      inverted: true
      mode: 
        input: true
    web_server:
      sorting_weight: 3  
      sorting_group_id: sorting_group_states
    filters:   
      - lambda: |-  
          if (x) {
            id(data_buf_latch)[1] |= 4;
          }
          return x;        
  - platform: gpio
    name: In 3
    id: in3
    pin: 
      number: GPIO35   #pin7  #input only
      inverted: true
      mode: 
        input: true
    web_server:
      sorting_weight: 4  
      sorting_group_id: sorting_group_states
    filters:   
      - lambda: |-  
          if (x) {
            id(data_buf_latch)[1] |= 8;
          }
          return x;       
  
  - platform: gpio
    name: In 4
    id: in4
    pin: 
      number: GPIO18   #pin8
      inverted: true
      mode: 
