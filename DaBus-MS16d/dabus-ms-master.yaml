###-------------------------

light:  
  - platform: monochromatic
    name: Blue LED
    output: output_onboard_led  
    id: blue_led
    

script:
## Reset state of modbus Slave
  - id: reset_signals
    then: 
      lambda: |-
        id(i2c_slave_address_text_sensor).publish_state("$i2c_slave_address");
        id(dabus_ms16d_01).set_address(id(modbus_sensor_first_addres).state+0);
        id(dabus_ms16d_02).set_address(id(modbus_sensor_first_addres).state+1);
        id(dabus_ms16d_03).set_address(id(modbus_sensor_first_addres).state+2);
        id(dabus_ms16d_04).set_address(id(modbus_sensor_first_addres).state+3);
        id(dabus_ms16d_05).set_address(id(modbus_sensor_first_addres).state+4);
        id(dabus_ms16d_06).set_address(id(modbus_sensor_first_addres).state+5);
        id(dabus_ms16d_07).set_address(id(modbus_sensor_first_addres).state+6);
        id(dabus_ms16d_08).set_address(id(modbus_sensor_first_addres).state+7);
        //id(dabus_ms16d_09).set_address(id(modbus_sensor_first_addres).state+8);
        return;
#        id(modbus_slave_controller).set_address(id(modbus_addr).state);


custom_component:
  - lambda: |-
      auto i2c_slave = new DABusI2CSlave(id($i2c_slave_address),16,17,id(data_buf_latch),id($numPinsBytes),id(i2c_slave_request_notify),id(i2c_sensor_message));
      return {i2c_slave};
    components:
    - id: i2c_slave_id 

text_sensor:

  - platform: template
    name: "I2C Sensor: Received Message"
    id: i2c_sensor_message
    internal: true
    on_value:
      then:
        - logger.log: "i2c slave received message"
  
  - platform: template
    name: "I2C Slave Address"
    id: i2c_slave_address_text_sensor
    entity_category: diagnostic

  # Expose ESPHome version as sensor.
  - platform: version
    name: Version

  # Expose WiFi information as sensors.
  - platform: wifi_info
    ip_address:
      name: IP
      update_interval: 60s
    bssid:
      name: BSSID
    

  # human readable update text sensor from sensor:uptime
  - platform: template
    name: Uptime Human Readable
    id: uptime_human
    icon: mdi:clock-start   
    entity_category: diagnostic
  
output:
#  GPIO0 GPIO2 GPIO5 GPIO12 is a strapping PIN and should only be used for I/O with care
#  GPIO (34-39) does not support output pin mode - they are input only pins  
#  GPIO (34-39) does not support pullups
#  Pin (9-10) might already be used by the flash interface in QUAD IO flash mode TXD_1, RXD_1

  - platform: ledc
    pin: GPIO2  # on board led
    id: output_onboard_led
    inverted: false 
    
