##RS485 port for modbus master (client) talking to slave devices
## or
##RS485 port for modbus slave (server) responding to master device
uart:  
   - id: uart_modbus
     tx_pin: 27  #pin24
     rx_pin: 25  #pin26
     baud_rate:  115200
     stop_bits: 1
#   
## defining modbus master (client)   
modbus:
   - uart_id: uart_modbus
     id: modbus_master
     flow_control_pin: GPIO23 # pin12


#The Modbus master controller controls the slave devices on the bus.
modbus_controller:
   - id: dabus_ms16d_01   
     address: ${modbus_sensor01} ## address of the Modbus slave device on the bus
     modbus_id: modbus_master     
     update_interval: $ms_update_interval
     command_throttle: $ms_command_throttle
     setup_priority: -10
     offline_skip_updates: $ms_offline_skip_updates
     max_cmd_retries: $ms_max_cmd_retries
     on_online:
       then:
         #- logger.log: "Modbus Sensor 01 back Online!"   #debug
         - lambda: |-
             //ESP_LOGI("main","Modbus Sensor 01 back Online!");
             id(dabus_ms16d_01).set_update_interval(2000);  // doesn't work
             return;
     on_offline:
       then:
         - lambda: |-
             //ESP_LOGI("main","Modbus Sensor 01 goes Offline!");
             id(dabus_ms16d_01).set_update_interval(60000); // doesn't work
             id(register_0x01).publish_state(NAN);
             id(data_buf)[2] = 0;
             id(data_buf)[3] = 0;
             id(data_buf_latch)[2] = 0;
             id(data_buf_latch)[3] = 0;
             return;
             
   
   - id: dabus_ms16d_02   
     address: ${modbus_sensor01 +1}  ## address of the Modbus slave device on the bus
     modbus_id: modbus_master     
