substitutions:
  devicename: DABus-MS16D
  
  # version 2025-09-09  19:59
  #
  # Digital Accessory Bus Modbus Sensor 16bit 
  #  * MCU: ESP32 module - wemos_d1_mini32
  #  * Master I2C Bus_A
  #     * TCA on I2C bus_A with 8 chanels to APDS9960 or APDS9900
  #     * Oled Display i2C Port
  #  * 8 direct input pins with optoisolation (no pcf857X expander)
  #  * Slave I2C bus_B (pull-up resistors soldered)
  #  * RS485 interface with MAX13467E for Modbus protocol
  #    * auxilary RS485 flow_control_pin: GPIO23 # pin12 for fake MAX13467E
  #  * Modbus device server role with configurable address
  #  * Modbus U_WORD register  containg states of 8 binary sensors and 8 optical sensors
  
  # https://docs.espressif.com/projects/esp-idf/en/latest/esp32/hw-reference/esp32/get-started-devkitc.html
  # https://rntlab.com/question/what-pins-are-the-i2c-pins-on-the-esp32/
  # https://www.luisllamas.es/en/which-pins-can-i-use-on-esp32/
  # https://docs.platformio.org/en/latest/boards/espressif32/wemos_d1_mini32.html
  # https://esphome.io/cookbook/lambda_magic.html
  # [Material Design Icons - Icon Library - Pictogrammers](https://pictogrammers.com/library/mdi/)
  # List of changes:
  # * web server with included js file
  # * the active state of the inputs is latched and remembered until it is cleared by reading via Modbus

