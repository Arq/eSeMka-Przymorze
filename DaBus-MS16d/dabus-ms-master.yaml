        value: 16
      - binary_sensor: in5
        value: 32
      - binary_sensor: in6
        value: 64
      - binary_sensor: in7
        value: 128

  - platform: template
    #name: "I2C slave data request"  
    internal: true
    id: i2c_slave_request_notify
    on_value:
      then:
        #- logger.log: "i2c request notify"  
        - lambda: |-
            //ESP_LOGI("i2c_slave_request_notify","i2c slave data sent");
            id(data_buf)[0] = 0;
            id(data_buf)[1] = id(sensors_map).state;
            // capture a copy of current data 
            for (uint8_t i=0;i<32;i++) {
              id(data_buf_latch)[i] = id(data_buf)[i];
            }

  - platform: modbus_controller
    modbus_controller_id: dabus_ms16d_01 
    name: "Register 0x01 (modbus)"
    id: register_0x01
    register_type: read
    unit_of_measurement: ""
    address: 0x0000      ##  address of the register inside the Modbus slave device
    value_type: U_WORD
    web_server:
      sorting_weight: 3  
      sorting_group_id: sorting_group_modbus
    lambda: |-  
       ESP_LOGI("modbus","Register 0x01: %02x%02x",data[0],data[1]);  //U_WORD: MSB , LSB 
       id(data_buf)[2] = data[0]; //register 1
       id(data_buf)[3] = data[1];
       id(data_buf_latch)[2] |=  data[0];
       id(data_buf_latch)[3] |=  data[1];
