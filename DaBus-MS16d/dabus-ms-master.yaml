    name: "Restart"
    entity_category: diagnostic
    
### Configuration switches

   
sensor:
  - platform: wifi_signal
    name: WiFi signal
    update_interval: 600s

  # human readable uptime sensor output to the text sensor above
  - platform: uptime
    name: Uptime in Days
    id: uptime_sensor_days
    internal: true
    update_interval: 60s
    on_raw_value:
      then:
        - text_sensor.template.publish:
            id: uptime_human
            state: !lambda |-
              int seconds = round(id(uptime_sensor_days).raw_state);
              int days = seconds / (24 * 3600);
              seconds = seconds % (24 * 3600);
              int hours = seconds / 3600;
              seconds = seconds % 3600;
              int minutes = seconds /  60;
              seconds = seconds % 60;
              // Conversion to string for board type: esp-idf and arduino
              char buffer[100]; // Allocate sufficient buffer size
              if ( days > 3650 ) {
                  return { "Starting up" };
              } else {
                if ( days ) {
                   sprintf(buffer, "%d d %d h %d m %d s",days,hours,minutes,seconds);
                } else if ( hours ) {
                   sprintf(buffer, "%d h %d m %d s",hours,minutes,seconds);
                } else if ( minutes ) {
                   sprintf(buffer, "%d m %d s",minutes,seconds);
                } else {
                   sprintf(buffer, "%d", seconds); 
                }   
                std::string str(buffer); // Convert char array to string
                return str;
              }
              
  - platform: dallas_temp
#   address: 0x...
    update_interval: 40s
    name: Temperature
    one_wire_id: wire_a
    id: sensor_t_ic
