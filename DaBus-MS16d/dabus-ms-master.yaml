     - filter_out: 85.0

  - platform: binary_sensor_map
    id: sensors_map
    name: 'Register 0x00 (local)'
    type: sum
    web_server:
      sorting_weight: 2  
      sorting_group_id: sorting_group_modbus
    channels:
      - binary_sensor: in0
